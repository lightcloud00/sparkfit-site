<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0e0d0b"/>
  <!-- Gold accent bar top -->
  <rect x="0" y="0" width="1200" height="6" fill="#e8a634"/>
  <!-- Left gold vertical accent -->
  <rect x="0" y="0" width="8" height="630" fill="#e8a634"/>
  <!-- App icon circle -->
  <circle cx="200" cy="315" r="120" fill="#161513" stroke="#e8a634" stroke-width="4"/>
  <!-- S letter in icon -->
  <text x="200" y="345" text-anchor="middle" font-family="Barlow Condensed, sans-serif" font-weight="900" font-size="140" fill="#e8a634">S</text>
  <!-- App name -->
  <text x="380" y="260" font-family="Barlow Condensed, sans-serif" font-weight="900" font-size="96" fill="#f0ece4" letter-spacing="4">SPARK</text>
  <!-- Tagline -->
  <text x="380" y="330" font-family="Inter, sans-serif" font-weight="400" font-size="32" fill="#e8a634">Fitness-First Connection</text>
  <!-- Subtext -->
  <text x="380" y="385" font-family="Inter, sans-serif" font-weight="400" font-size="24" fill="rgba(240,236,228,0.6)">Meet people who train. Workout together. Go further.</text>
  <!-- CTA badge -->
  <rect x="380" y="420" width="280" height="56" rx="8" fill="#e8a634"/>
  <text x="520" y="458" text-anchor="middle" font-family="Barlow Condensed, sans-serif" font-weight="800" font-size="24" fill="#0e0d0b" letter-spacing="2">JOIN WAITLIST</text>
  <!-- Bottom url -->
  <text x="600" y="600" text-anchor="middle" font-family="Inter, sans-serif" font-weight="400" font-size="20" fill="rgba(240,236,228,0.35)">sparkfit.app</text>
  <!-- Decorative dots -->
  <circle cx="1100" cy="100" r="40" fill="rgba(232,166,52,0.1)"/>
  <circle cx="1050" cy="160" r="20" fill="rgba(232,166,52,0.07)"/>
  <circle cx="1140" cy="200" r="12" fill="rgba(232,166,52,0.05)"/>
</svg>
